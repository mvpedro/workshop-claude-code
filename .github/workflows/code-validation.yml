name: "Code Validation: Compliance & Standards"

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'demo/src/**'
      - 'demo/dbt/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only origin/main...HEAD -- demo/ | tr '\n' ',')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate changes against project docs
        id: validation
        working-directory: validation-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          PROMPT=$(cat <<'PROMPT_END'
          Você é um agente de validação de código. Analise os seguintes arquivos modificados neste PR:

          Arquivos modificados: ${CHANGED_FILES}

          Para cada arquivo, leia o código-fonte em ../demo/ e valide contra a documentação do projeto.

          Execute 3 verificações em paralelo usando a ferramenta Agent:

          1. **Compliance** — Leia APENAS os arquivos em docs/compliance/ e valide contra requisitos LGPD, políticas de dados e restrições de integração.

          2. **Produto & Estilo** — Leia APENAS os arquivos em docs/produto/ e docs/estilo/ e valide contra decisões de produto, roadmap, regras de negócio e padrões de estilo.

          3. **Técnico** — Leia APENAS os arquivos em docs/tecnico/ e valide contra decisões de arquitetura, stack definida, princípios técnicos e padrões de testes.

          Para cada verificação, reporte:
          - ✅ **Compatível**: o código está alinhado com [documento X]
          - ⚠️ **Atenção**: o código pode conflitar com [decisão Y em documento Z]. Detalhe: [explicação]
          - ❌ **Conflito**: o código contradiz diretamente [requisito W em documento V]. Detalhe: [explicação]

          ## Formato de saída

          Responda em markdown com três seções (Compliance, Produto & Estilo, Técnico), cada uma com os findings.
          No final, inclua um resumo:
          - Se houver algum ❌: "## Resultado: ❌ BLOQUEADO — conflitos encontrados"
          - Se houver apenas ⚠️: "## Resultado: ⚠️ ATENÇÃO — revisar antes de mergear"
          - Se tudo ✅: "## Resultado: ✅ APROVADO — nenhum conflito encontrado"
          PROMPT_END

          # Substitute env var
          PROMPT=$(echo "$PROMPT" | sed "s/\${CHANGED_FILES}/$CHANGED_FILES/g")

          claude -p "$PROMPT" --allowedTools Read,Glob,Grep,Agent > validation_output.md 2>&1

          cat validation_output.md

          # Check for blocking conflicts
          if grep -q "❌ BLOQUEADO" validation_output.md; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validation-agent/validation_output.md', 'utf8');
            const body = `## 🤖 Validação Automática de Código\n\n${output}\n\n---\n*Gerado automaticamente por Claude Code via [agente de validação](../validation-agent/)*`;

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c => c.body.includes('Validação Automática de Código'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if conflicts found
        if: steps.validation.outputs.status == 'failed'
        run: |
          echo "❌ Conflitos encontrados. PR bloqueado até resolução."
          exit 1
