name: "Code Validation: Compliance & Standards"

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'demo/src/**'
      - 'demo/dbt/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only origin/main...HEAD -- demo/ | tr '\n' ',')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate changes against project docs
        id: validation
        working-directory: validation-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          sed "s|CHANGED_FILES_PLACEHOLDER|$CHANGED_FILES|g" prompts/validate-pr.md > /tmp/prompt.md
          claude -p "$(cat /tmp/prompt.md)" --allowedTools Read,Glob,Grep,Agent > validation_output.md 2>&1 || true
          cat validation_output.md
          if grep -q "BLOQUEADO" validation_output.md; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = 'Validation output not available.';
            try {
              output = fs.readFileSync('validation-agent/validation_output.md', 'utf8');
            } catch (e) {}
            const body = `## Validacao Automatica de Codigo\n\n${output}\n\n---\n*Gerado automaticamente por Claude Code*`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c => c.body.includes('Validacao Automatica de Codigo'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if conflicts found
        if: steps.validation.outputs.status == 'failed'
        run: |
          echo "Conflitos encontrados. PR bloqueado ate resolucao."
          exit 1
